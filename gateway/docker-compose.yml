services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sos-gateway
    # Pass the USB device into the container.
    # On Linux the host path is typically /dev/ttyUSB0.
    devices:
      - /dev/ttyUSB0:/dev/ttyUSB0
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - DB_PATH=/data/gateway.db
      # REGISTRATION_SECRET must be in .env and match the cloud's REGISTRATION_SECRET
    volumes:
      - gateway-sqlite:/data
    restart: unless-stopped

volumes:
  gateway-sqlite:
