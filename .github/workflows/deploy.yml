name: Build, push & deploy

# Triggers on push to main or manual run from the Actions tab
on:
  push:
    branches: [auth]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  # ── Job 1: Build on GitHub (powerful runner) and push to GHCR ───────────────
  build:
    name: Build & push Docker images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # required to push to GHCR

    outputs:
      # Pass the short SHA to the deploy job for traceability
      sha_tag: ${{ steps.meta.outputs.sha_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # automatically available, no setup needed

      - name: Set short SHA tag
        id: meta
        run: echo "sha_tag=sha-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      # ── Backend ──────────────────────────────────────────────────────────────
      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: cloud/backend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/sos-backend:latest
            ghcr.io/${{ github.repository_owner }}/sos-backend:${{ steps.meta.outputs.sha_tag }}
          # Layer cache stored in GitHub Actions cache — makes rebuilds fast
          cache-from: type=gha,scope=sos-backend
          cache-to:   type=gha,mode=max,scope=sos-backend

      # ── Frontend ─────────────────────────────────────────────────────────────
      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: cloud/frontend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/sos-frontend:latest
            ghcr.io/${{ github.repository_owner }}/sos-frontend:${{ steps.meta.outputs.sha_tag }}
          cache-from: type=gha,scope=sos-frontend
          cache-to:   type=gha,mode=max,scope=sos-frontend

  # ── Job 2: SSH into server — only pull + restart (no build on server!) ───────
  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: build   # wait for images to be pushed before deploying

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key:      ${{ secrets.SSH_KEY }}
          port:     ${{ secrets.SSH_PORT || 22 }}
          # --no-build = skip docker compose build, just pull from GHCR
          script: |
            cd ${{ secrets.SERVER_PATH }}
            bash cloud/scripts/deploy.sh --no-build

      - name: Report on failure
        if: failure()
        run: |
          echo "Deploy failed — auto-rollback was triggered on the server."
          echo "Images built and pushed successfully (sha: ${{ needs.build.outputs.sha_tag }})."
          echo "To rollback manually: ssh into server and run ./cloud/scripts/rollback.sh"
