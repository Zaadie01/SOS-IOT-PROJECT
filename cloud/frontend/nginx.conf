server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Static assets — long cache, immutable (hashed filenames)
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Favicon and other root-level static files — short cache, correct MIME
    location ~* \.(ico|png|svg|webmanifest)$ {
        expires 1h;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
