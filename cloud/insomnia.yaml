environments:
  name: Base Environment
  meta:
    id: env_d5f7c979ca184f068152eff98ce8c597
    created: 1775120803760
    modified: 1780200000000
    isPrivate: false
  data:
    base_url: "https://app-project.org"
    # After POST /login — paste token from response
    jwt_token: ""
    # After POST /devices — paste id and registration_code
    device_db_id: ""
