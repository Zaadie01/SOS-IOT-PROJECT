          modified: 1780300000000
          isPrivate: false
          description: "Owner invites Bob by user_id. Returns 201 {id, status:'pending'}. Copy id → invitation_id. 409 if already pending|accepted; resends if declined."
          sortKey: -360
        method: POST
        body:
          mimeType: application/json
          text: |-
            {
              "user_id": {{ invitee_user_id }}
            }
        headers:
          - name: Content-Type
            value: application/json
          - name: Authorization
            value: "Bearer {{ jwt_token }}"
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies: { send: true, store: true }
