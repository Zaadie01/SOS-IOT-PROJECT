type: collection.insomnia.rest/5.0
schema_version: "5.1"
name: SOS IoT API
meta:
  id: wrk_9e49ffc21a0848e1a48207fcca839ca3
  created: 1775120803760
  modified: 1780200000000
  description: "SOS IoT — full API collection. Base URL: https://app-project.org"
collection:

  # ════════════════════════════════════════════════════════
  # HEALTH
  # ════════════════════════════════════════════════════════
  - name: Health
    meta:
      id: fld_health_001
      created: 1780200000000
      modified: 1780200000000
      sortKey: -100
      description: ""
    children:
      - url: "{{ base_url }}/"
        name: GET / — server status
        meta:
          id: req_health_001
          created: 1780200000000
          modified: 1780200000000
          isPrivate: false
          description: "Returns OK and connected WebSocket client count. No auth required."
          sortKey: -100
        method: GET
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies: { send: true, store: true }
          rebuildPath: true

  # ════════════════════════════════════════════════════════
  # AUTH
  # ════════════════════════════════════════════════════════
  - name: Auth
    meta:
      id: fld_auth_001
      created: 1780200000000
      modified: 1780200000000
      sortKey: -200
      description: "Registration, login, Google OAuth, invites"
    children:

      - url: "{{ base_url }}/api/auth/register"
        name: POST /register — create account
        meta:
          id: req_auth_register
          created: 1780200000000
          modified: 1780200000000
          isPrivate: false
          description: "Open registration. Returns token — copy it into jwt_token env variable."
          sortKey: -210
        method: POST
        body:
          mimeType: application/json
          text: |-
            {
              "email": "alice@example.com",
              "password": "secret123",
              "name": "Alice"
            }
        headers:
          - name: Content-Type
            value: application/json
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies: { send: true, store: true }
          rebuildPath: true

      - url: "{{ base_url }}/api/auth/login"
        name: POST /login — sign in (Passport Local)
        meta:
          id: req_auth_login
          created: 1780200000000
          modified: 1780200000000
          isPrivate: false
          description: "Authenticates via Passport Local strategy. Returns token — copy into jwt_token."
          sortKey: -209
        method: POST
        body:
          mimeType: application/json
          text: |-
            {
              "email": "alice@example.com",
              "password": "secret123"
            }
        headers:
          - name: Content-Type
            value: application/json
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies: { send: true, store: true }
          rebuildPath: true

      - url: "{{ base_url }}/api/auth/login"
        name: POST /login ❌ wrong password (401)
        meta:
          id: req_auth_login_fail
          created: 1780200000000
          modified: 1780200000000
          isPrivate: false
          description: "Should return 401 Invalid credentials."
          sortKey: -208
        method: POST
        body:
          mimeType: application/json
          text: |-
            {
              "email": "alice@example.com",
              "password": "wrongpass"
            }
        headers:
          - name: Content-Type
            value: application/json
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies: { send: true, store: true }
          rebuildPath: true

      - url: "{{ base_url }}/api/auth/me"
        name: GET /me — current user
        meta:
          id: req_auth_me
          created: 1780200000000
          modified: 1780200000000
          isPrivate: false
          description: "Returns id, email, role decoded from the JWT."
          sortKey: -207
        method: GET
        headers:
          - name: Authorization
            value: "Bearer {{ jwt_token }}"
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies: { send: true, store: true }
          rebuildPath: true

      - url: "{{ base_url }}/api/auth/me"
        name: GET /me ❌ no token (401)
        meta:
          id: req_auth_me_fail
          created: 1780200000000
          modified: 1780200000000
          isPrivate: false
          description: "No Authorization header — should return 401."
          sortKey: -206
        method: GET
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies: { send: true, store: true }
          rebuildPath: true

      - url: "{{ base_url }}/api/auth/google"
        name: GET /google — Google OAuth (browser only)
        meta:
          id: req_auth_google
          created: 1780200000000
          modified: 1780200000000
          isPrivate: false
          description: "Open in a browser — redirects to Google. Returns 503 if GOOGLE_CLIENT_ID is not configured."
          sortKey: -205
        method: GET
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies: { send: true, store: true }
          rebuildPath: true

  # ════════════════════════════════════════════════════════
  # DEVICES
  # ════════════════════════════════════════════════════════
  - name: Devices
    meta:
      id: fld_devices_001
      created: 1780200000000
      modified: 1780200000000
      sortKey: -300
      description: "Device CRUD. Each user sees only their own. Status: pending / online / offline / warning."
    children:

      - url: "{{ base_url }}/api/devices"
        name: GET /devices — list my devices
        meta:
          id: req_devices_list
          created: 1780200000000
          modified: 1780200000000
          isPrivate: false
          description: "Returns devices with computed status: pending (not registered), online (ping < 5min), offline (ping > 5min), warning (firmware reported a problem)."
          sortKey: -310
        method: GET
        headers:
          - name: Authorization
            value: "Bearer {{ jwt_token }}"
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies: { send: true, store: true }
          rebuildPath: true

      - url: "{{ base_url }}/api/devices"
        name: POST /devices — create device
        meta:
          id: req_devices_create
          created: 1780200000000
          modified: 1780200000000
          isPrivate: false
          description: "Creates a device slot. Copy id → device_db_id and registration_code → registration_code from the response."
          sortKey: -309
        method: POST
        body:
          mimeType: application/json
          text: |-
            {
              "name": "Office SOS Button"
            }
        headers:
          - name: Content-Type
            value: application/json
          - name: Authorization
            value: "Bearer {{ jwt_token }}"
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies: { send: true, store: true }
          rebuildPath: true

      - url: "{{ base_url }}/api/devices/{{ device_db_id }}"
        name: PATCH /devices/:id — rename device
        meta:
          id: req_devices_rename
          created: 1780200000000
          modified: 1780200000000
          isPrivate: false
          description: "Rename a device. Owner only."
          sortKey: -308
        method: PATCH
        body:
          mimeType: application/json
          text: |-
            {
              "name": "Lobby SOS Button"
            }
        headers:
          - name: Content-Type
            value: application/json
          - name: Authorization
            value: "Bearer {{ jwt_token }}"
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies: { send: true, store: true }
          rebuildPath: true

      - url: "{{ base_url }}/api/devices/{{ device_db_id }}"
        name: DELETE /devices/:id — delete device
        meta:
          id: req_devices_delete
          created: 1780200000000
          modified: 1780200000000
          isPrivate: false
          description: "Deletes the device and all its SOS history."
          sortKey: -305
        method: DELETE
        headers:
          - name: Authorization
            value: "Bearer {{ jwt_token }}"
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies: { send: true, store: true }
          rebuildPath: true

      - url: "{{ base_url }}/api/devices/9999"
        name: DELETE /devices/9999 ❌ not owner (404)
        meta:
          id: req_devices_delete_fail
          created: 1780200000000
          modified: 1780200000000
          isPrivate: false
          description: "ID does not belong to current user — should return 404."
          sortKey: -304
        method: DELETE
        headers:
          - name: Authorization
            value: "Bearer {{ jwt_token }}"
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies: { send: true, store: true }
          rebuildPath: true

  # ════════════════════════════════════════════════════════
  # GATEWAY (firmware → server)
  # ════════════════════════════════════════════════════════
  - name: Gateway
    meta:
      id: fld_gateway_001
      created: 1780200000000
      modified: 1780200000000
      sortKey: -400
      description: "Requests sent by the physical IoT device. Auth via x-gateway-token header."
    children:

      - url: "{{ base_url }}/api/gateway/register"
        name: POST /gateway/register ✅ register with code
        meta:
          id: req_gw_register
          created: 1780200000000
          modified: 1780200000000
          isPrivate: false
          description: "Firmware registers using registration_code. Returns token — copy into gateway_token."
          sortKey: -410
        method: POST
        body:
          mimeType: application/json
          text: |-
            {
              "gateway_id": "{{ gateway_id }}",
              "device_id": "{{ device_id }}",
              "registration_code": "{{ registration_code }}"
            }
        headers:
          - name: Content-Type
            value: application/json
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies: { send: true, store: true }
          rebuildPath: true

      - url: "{{ base_url }}/api/gateway/register"
        name: POST /gateway/register ❌ invalid code (401)
        meta:
          id: req_gw_register_fail
          created: 1780200000000
          modified: 1780200000000
          isPrivate: false
          description: "Code does not exist — should return 401."
          sortKey: -409
        method: POST
        body:
          mimeType: application/json
          text: |-
            {
              "gateway_id": "{{ gateway_id }}",
              "registration_code": "BADCODE1"
            }
        headers:
          - name: Content-Type
            value: application/json
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies: { send: true, store: true }
          rebuildPath: true

      - url: "{{ base_url }}/api/gateway/ping"
        name: POST /gateway/ping — heartbeat
        meta:
          id: req_gw_ping
          created: 1780200000000
          modified: 1780200000000
          isPrivate: false
          description: "Updates last_seen_at. Firmware should send this every N seconds."
          sortKey: -408
        method: POST
        headers:
          - name: x-gateway-token
            value: "{{ gateway_token }}"
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies: { send: true, store: true }
          rebuildPath: true

      - url: "{{ base_url }}/api/gateway/warning"
        name: POST /gateway/warning — set warning
        meta:
          id: req_gw_warn_set
          created: 1780200000000
          modified: 1780200000000
          isPrivate: false
          description: "Firmware reports a problem (e.g. node disconnected)."
          sortKey: -407
        method: POST
        body:
          mimeType: application/json
          text: |-
            {
              "message": "IoT node disconnected"
            }
        headers:
          - name: Content-Type
            value: application/json
          - name: x-gateway-token
            value: "{{ gateway_token }}"
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies: { send: true, store: true }
          rebuildPath: true

      - url: "{{ base_url }}/api/gateway/warning"
        name: POST /gateway/warning — clear warning
        meta:
          id: req_gw_warn_clear
          created: 1780200000000
          modified: 1780200000000
          isPrivate: false
          description: "Send message: null to clear a previous warning."
          sortKey: -406
        method: POST
        body:
          mimeType: application/json
          text: |-
            {
              "message": null
            }
        headers:
          - name: Content-Type
            value: application/json
          - name: x-gateway-token
            value: "{{ gateway_token }}"
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies: { send: true, store: true }
          rebuildPath: true

  # ════════════════════════════════════════════════════════
  # SOS DATA
  # ════════════════════════════════════════════════════════
  - name: SOS Data
    meta:
      id: fld_sosdata_001
      created: 1780200000000
      modified: 1780200000000
      sortKey: -500
      description: "SOS event payloads sent by the firmware."
    children:

      - url: "{{ base_url }}/api/gateway/data"
        name: POST /gateway/data ✅ SOS alert
        meta:
          id: req_data_sos
          created: 1780200000000
          modified: 1780200000000
          isPrivate: false
          description: "Triggers a real SOS — broadcasts to all WebSocket clients and saves to history."
          sortKey: -510
        method: POST
        body:
          mimeType: application/json
          text: |-
            {
              "timestamp": 1711929600000,
              "device_id": "{{ device_id }}",
              "button_pressed": 3,
              "gateway_id": "{{ gateway_id }}",
              "sos_alert": true
            }
        headers:
          - name: Content-Type
            value: application/json
          - name: x-gateway-token
            value: "{{ gateway_token }}"
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies: { send: true, store: true }
          rebuildPath: true

      - url: "{{ base_url }}/api/gateway/data"
        name: POST /gateway/data — non-SOS (ignored)
        meta:
          id: req_data_nosos
          created: 1780200000000
          modified: 1780200000000
          isPrivate: false
          description: "sos_alert: false — server acknowledges but does not store."
          sortKey: -509
        method: POST
        body:
          mimeType: application/json
          text: |-
            {
              "timestamp": 1711929600000,
              "device_id": "{{ device_id }}",
              "button_pressed": 0,
              "gateway_id": "{{ gateway_id }}",
              "sos_alert": false
            }
        headers:
          - name: Content-Type
            value: application/json
          - name: x-gateway-token
            value: "{{ gateway_token }}"
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies: { send: true, store: true }
          rebuildPath: true

      - url: "{{ base_url }}/api/gateway/data"
        name: POST /gateway/data ❌ no token (401)
        meta:
          id: req_data_notoken
          created: 1780200000000
          modified: 1780200000000
          isPrivate: false
          description: "No x-gateway-token header — should return 401."
          sortKey: -508
        method: POST
        body:
          mimeType: application/json
          text: |-
            {
              "timestamp": 1711929600000,
              "device_id": "{{ device_id }}",
              "gateway_id": "{{ gateway_id }}",
              "sos_alert": true
            }
        headers:
          - name: Content-Type
            value: application/json
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies: { send: true, store: true }
          rebuildPath: true

  # ════════════════════════════════════════════════════════
  # ALERTS
  # ════════════════════════════════════════════════════════
  - name: Alerts
    meta:
      id: fld_alerts_001
      created: 1780200000000
      modified: 1780200000000
      sortKey: -600
      description: "SOS history. Each user sees only alerts from their own devices."
    children:

      - url: "{{ base_url }}/api/alerts/sos"
        name: GET /alerts/sos ✅ my history
        meta:
          id: req_alerts_list
          created: 1780200000000
          modified: 1780200000000
          isPrivate: false
          description: "Returns alerts from the current user's devices only, newest first."
          sortKey: -610
        method: GET
        headers:
          - name: Authorization
            value: "Bearer {{ jwt_token }}"
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies: { send: true, store: true }
          rebuildPath: true

      - url: "{{ base_url }}/api/alerts/sos"
        name: GET /alerts/sos ❌ no token (401)
        meta:
          id: req_alerts_noauth
          created: 1780200000000
          modified: 1780200000000
          isPrivate: false
          description: "Protected endpoint — should return 401."
          sortKey: -609
        method: GET
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies: { send: true, store: true }
          rebuildPath: true

  # ════════════════════════════════════════════════════════
  # GATEWAYS
  # ════════════════════════════════════════════════════════
  - name: Gateways
    meta:
      id: fld_gateways_001
      created: 1780200000000
      modified: 1780200000000
      sortKey: -700
      description: "Admin sees all. Regular user sees only their own."
    children:

      - url: "{{ base_url }}/api/gateways"
        name: GET /gateways — list
        meta:
          id: req_gw_list
          created: 1780200000000
          modified: 1780200000000
          isPrivate: false
          description: "Admin: all gateways + owner_email. Regular user: own gateways only."
          sortKey: -710
        method: GET
        headers:
          - name: Authorization
            value: "Bearer {{ jwt_token }}"
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies: { send: true, store: true }
          rebuildPath: true

      - url: "{{ base_url }}/api/gateways/{{ gateway_id }}"
        name: GET /gateways/:id — single gateway
        meta:
          id: req_gw_single
          created: 1780200000000
          modified: 1780200000000
          isPrivate: false
          description: "Lookup by gateway_id string. Returns 403 if not the owner."
          sortKey: -709
        method: GET
        headers:
          - name: Authorization
            value: "Bearer {{ jwt_token }}"
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies: { send: true, store: true }
          rebuildPath: true

cookieJar:
  name: Default Jar
  meta:
