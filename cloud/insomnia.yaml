  - name: Invitations
    meta:
      id: fld_inv_001
      created: 1780300000000
      modified: 1780300000000
      sortKey: -350
      description: "Share device access with other users. Owner invites and deletes rows; invitee accepts/declines/stops-watching. Statuses: pending → accepted | declined. Resend resets declined to pending."
    children:

      - url: "{{ base_url }}/api/devices/{{ device_db_id }}/invitations"
        name: POST /devices/:id/invitations — invite by user_id
        meta:
          id: req_inv_create_uid
