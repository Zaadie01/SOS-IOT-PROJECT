version: "3.9"

services:
  backend:
    build:
      context: ./backend/src
      dockerfile: Dockerfile
    container_name: sos-backend
    ports:
      - "5001:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
    volumes:
      - ./backend/src:/app
      - /app/node_modules
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend/src
      dockerfile: Dockerfile
    container_name: sos-frontend
    ports:
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WDS_SOCKET_PORT=0
    volumes:
      - ./frontend/src:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped
