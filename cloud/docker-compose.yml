name: sos-iot

services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
      - ./certs:/etc/ssl/cf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

  backend:
    # build: section kept for local `docker compose build` (dev only)
    build:
      context: ./backend
      dockerfile: Dockerfile
    # On the server this resolves to ghcr.io/OWNER/sos-backend:latest
    # Set REGISTRY_OWNER in cloud/.env
    image: ghcr.io/${REGISTRY_OWNER}/sos-backend:${IMAGE_TAG:-latest}
    container_name: sos-backend
    env_file:
      - ./backend/.env
    environment:
      - PORT=3001
    volumes:
      - sqlite-data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: ghcr.io/${REGISTRY_OWNER}/sos-frontend:${IMAGE_TAG:-latest}
    container_name: sos-frontend
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
  sqlite-data:
